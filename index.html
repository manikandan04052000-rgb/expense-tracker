<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
	<link rel="icon" type="image/png" href="C:\HTML Mani\—Pngtree—budgeting 3d icon financial planning_20452281.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpensePro Ultra | 2026 Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
         :root {
            --primary: #22c55e;
            --secondary: #6366f1;
            --danger: #ef4444;
            --bg: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
        }
        
        * {
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s ease;
        }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.1) 0, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .app-grid {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 24px;
            max-width: 1700px;
            margin: auto;
        }
        
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }
        
        .accent {
            color: var(--primary);
        }
        
        .field {
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        input,
        select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }
        
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }
        
        input.error {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: #052e16;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.4);
        }
        
        .btn-secondary {
            background: var(--secondary);
            color: white;
            margin-top: 15px;
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 22px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }
        
        .stat-box::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
        }
        
        .stat-box.danger::after {
            background: var(--danger);
        }
        
        .stat-box span {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 600;
        }
        
        .stat-box h3 {
            margin: 8px 0 0;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
        }
        
        .table-wrapper {
            margin-top: 10px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        
        th {
            text-align: left;
            padding: 12px;
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
        }
        
        tr {
            background: rgba(255, 255, 255, 0.03);
        }
        
        td {
            padding: 16px 12px;
            font-size: 0.9rem;
        }
        
        td:first-child {
            border-radius: 12px 0 0 12px;
        }
        
        td:last-child {
            border-radius: 0 12px 12px 0;
        }
        
        .badge-cat {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .del-btn {
            color: #f87171;
            background: none;
            border: 1px solid #f87171;
            width: auto;
            padding: 4px 10px;
            font-size: 0.7rem;
            border-radius: 8px;
        }
        
        .del-btn:hover {
            background: #f87171;
            color: white;
        }
        
        @media (max-width: 1200px) {
            .app-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="app-grid">
        <aside class="glass-card">
            <h2><span class="accent">✦</span> Setup & Entry</h2>
            <div class="field">
                <label>Choose Month</label>
                <select id="activeMonth" onchange="refreshDashboard()">
                <option value="0">January</option><option value="1">February</option>
                <option value="2" selected>March</option><option value="3">April</option>
                <option value="4">May</option><option value="5">June</option>
                <option value="6">July</option><option value="7">August</option>
                <option value="8">September</option><option value="9">October</option>
                <option value="10">November</option><option value="11">December</option>
            </select>
            </div>
            <div class="field">
                <label>Monthly Budget Limit (₹)</label>
                <input type="number" id="budgetLimit" value="30000" oninput="saveConfig()">
            </div>
            <hr style="border: 0.5px solid var(--border); margin: 25px 0;">
            <div class="field">
                <label id="dateLabel">Day (Max 31)</label>
                <input type="number" id="date" placeholder="1-31" min="1" max="31">
            </div>
            <div class="field">
                <label>Category</label>
                <input type="text" id="cat" placeholder="e.g. Shopping, Rent">
            </div>
            <div class="field">
                <label>Amount (₹)</label>
                <input type="number" id="amt" placeholder="0.00">
            </div>
            <button class="btn-primary" onclick="addExpense()">Add Transaction</button>
            <button class="btn-secondary" onclick="exportData()">Download Excel Report</button>
        </aside>

        <main>
            <div class="stats-container">
                <div class="stat-box">
                    <span>TOTAL SPENT</span>
                    <h3 id="totalSpent">₹0</h3>
                </div>
                <div class="stat-box" id="balanceBox">
                    <span>BALANCE</span>
                    <h3 id="balanceAmt">₹30,000</h3>
                </div>
                <div class="stat-box">
                    <span>ENTRIES</span>
                    <h3 id="entryCount">0</h3>
                </div>
            </div>

            <div class="glass-card">
                <h2><span>📋</span> Recent Transactions</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>DATE</th>
                                <th>CATEGORY</th>
                                <th>AMOUNT</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <aside class="glass-card">
            <h2><span class="accent">📊</span> Analytics</h2>
            <div style="margin-top: 20px;"><canvas id="pieChart"></canvas></div>
            <div style="margin-top: 40px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 15px;">
                <label>AI Insights</label>
                <p id="insightText" style="font-size: 0.85rem; color: #94a3b8; line-height: 1.5;">Start adding records...</p>
            </div>
            <button style="background:none; color:#64748b; font-size: 0.7rem; margin-top: 20px;" onclick="clearAllData()">Reset All Data</button>
        </aside>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('expenses_2026')) || [];
        let pChart;
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        function saveConfig() {
            localStorage.setItem('budget_2026', document.getElementById('budgetLimit').value);
            refreshDashboard();
        }

        function addExpense() {
            const monthIdx = parseInt(document.getElementById('activeMonth').value);
            const dayInput = document.getElementById('date');
            const d = parseInt(dayInput.value);
            const c = document.getElementById('cat').value;
            const a = parseFloat(document.getElementById('amt').value);

            // --- EXPERT DATE VALIDATION ---
            const year = 2026;
            const maxDays = new Date(year, monthIdx + 1, 0).getDate(); // Get last day of month

            if (!d || d < 1 || d > maxDays) {
                alert(`Error: ${months[monthIdx]} only has ${maxDays} days!`);
                dayInput.classList.add('error');
                return;
            }
            dayInput.classList.remove('error');

            if (!c || !a || a <= 0) {
                alert("Please enter a valid category and amount!");
                return;
            }

            const entry = {
                id: Date.now(),
                month: months[monthIdx],
                monthIdx,
                date: d,
                cat: c,
                amt: a
            };
            expenses.push(entry);
            localStorage.setItem('expenses_2026', JSON.stringify(expenses));

            dayInput.value = "";
            document.getElementById('cat').value = "";
            document.getElementById('amt').value = "";
            refreshDashboard();
        }

        function deleteEntry(id) {
            expenses = expenses.filter(e => e.id !== id);
            localStorage.setItem('expenses_2026', JSON.stringify(expenses));
            refreshDashboard();
        }

        function refreshDashboard() {
            const monthIdx = parseInt(document.getElementById('activeMonth').value);
            const selectedMonthName = months[monthIdx];
            const budget = parseFloat(document.getElementById('budgetLimit').value) || 0;

            // Update Day Label Dynamically
            const maxDays = new Date(2026, monthIdx + 1, 0).getDate();
            document.getElementById('dateLabel').innerText = `Day (1-${maxDays})`;

            const filtered = expenses.filter(e => e.month === selectedMonthName);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";

            let total = 0;
            let cats = {};

            filtered.sort((a, b) => a.date - b.date).forEach(e => {
                total += e.amt;
                cats[e.cat] = (cats[e.cat] || 0) + e.amt;
                tbody.innerHTML += `
                <tr>
                    <td>${e.date} ${selectedMonthName.substring(0,3)}</td>
                    <td><span class="badge-cat">${e.cat}</span></td>
                    <td><strong>₹${e.amt.toLocaleString()}</strong></td>
                    <td><button class="del-btn" onclick="deleteEntry(${e.id})">Delete</button></td>
                </tr>
            `;
            });

            document.getElementById('totalSpent').innerText = `₹${total.toLocaleString()}`;
            document.getElementById('entryCount').innerText = filtered.length;

            const balance = budget - total;
            const balEl = document.getElementById('balanceAmt');
            const balBox = document.getElementById('balanceBox');
            balEl.innerText = `₹${balance.toLocaleString()}`;

            balEl.style.color = balance < 0 ? 'var(--danger)' : 'var(--primary)';
            balance < 0 ? balBox.classList.add('danger') : balBox.classList.remove('danger');

            updateInsights(cats, total, budget);
            renderChart(cats);
        }

        function updateInsights(cats, total, budget) {
            const text = document.getElementById('insightText');
            if (total === 0) {
                text.innerText = "No data for this month.";
                return;
            }

            const topCat = Object.keys(cats).reduce((a, b) => cats[a] > cats[b] ? a : b);
            let msg = `Highest spending on <b>${topCat}</b>. `;
            if (total > budget) msg += "<br><span style='color:#ef4444'>⚠️ Over Budget!</span>";
            text.innerHTML = msg;
        }

        function renderChart(catData) {
            const ctx = document.getElementById('pieChart').getContext('2d');
            if (pChart) pChart.destroy();
            if (Object.keys(catData).length === 0) return;

            pChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(catData),
                    datasets: [{
                        data: Object.values(catData),
                        backgroundColor: ['#22c55e', '#6366f1', '#f59e0b', '#ec4899', '#06b6d4'],
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#94a3b8',
                                font: {
                                    size: 10
                                }
                            }
                        }
                    },
                    cutout: '70%'
                }
            });
        }

        function exportData() {
            const monthIdx = document.getElementById('activeMonth').value;
            const filtered = expenses.filter(e => e.month === months[monthIdx]);
            if (filtered.length === 0) return alert("No data to export!");
            const ws = XLSX.utils.json_to_sheet(filtered);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Expenses");
            XLSX.writeFile(wb, `Expenses_${months[monthIdx]}_2026.xlsx`);
        }

        function clearAllData() {
            if (confirm("Are you sure? This will delete EVERYTHING.")) {
                localStorage.clear();
                expenses = [];
                refreshDashboard();
            }
        }

        if (localStorage.getItem('budget_2026')) document.getElementById('budgetLimit').value = localStorage.getItem('budget_2026');
        refreshDashboard();
    </script>

</body>

</html>
